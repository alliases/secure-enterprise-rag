# File: .pre-commit-config.yaml

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent trailing whitespace
      - id: trailing-whitespace
      # Ensure files end with a newline
      - id: end-of-file-fixer
      # Validate YAML syntax
      - id: check-yaml
      # Validate TOML syntax
      - id: check-toml
      # Prevent committing large files (e.g., local db dumps, vector indexes)
      - id: check-added-large-files
        args: ['--maxkb=5000']
      # Hard architectural barrier against secret leaks
      - id: detect-private-key
      # Prevent committing unresolved merge conflicts
      - id: check-merge-conflict
      # Block accidental commits of breakpoint(), pdb, or ipdb
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Run the linter and apply safe fixes automatically
      - id: ruff
        args: [ --fix ]
      # Run the formatter
      - id: ruff-format
